<!DOCTYPE html>
<html>
<head>
    <title>Clear Zinga Linga Storage</title>
</head>
<body>
    <h1>Clear Zinga Linga Storage</h1>
    <button onclick="clearStorage()">Clear All Data</button>
    <div id="result"></div>

    <script>
        function clearStorage() {
            localStorage.removeItem('zinga-linga-data');
            document.getElementById('result').innerHTML = '<p style="color: green;">✅ Storage cleared! Refresh your app to start with clean data.</p>';
        }
    </script>
</body>
</html>
